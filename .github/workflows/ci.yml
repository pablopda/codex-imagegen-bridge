name: CI

on:
  pull_request:
  push:
    branches: [main, work]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: python3 -m py_compile src/codex_imagegen_bridge/*.py scripts/doctor plugins/codex-image/scripts/codex-imagegen plugins/codex-image/scripts/doctor
      - name: Validate plugin JSON
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json >/dev/null
          python3 -m json.tool plugins/codex-image/.claude-plugin/plugin.json >/dev/null
      - name: Install test dependencies
        run: python3 -m pip install -e '.[test]'
      - name: Console entry point smoke test
        run: codex-imagegen --help
      - name: Run tests
        run: python3 -m pytest -q
      - name: Build Python artifacts
        run: python3 -m build
      - name: Wheel smoke test
        run: |
          tmp_dir="$(mktemp -d)"
          python3 -m venv "$tmp_dir/venv"
          "$tmp_dir/venv/bin/python" -m pip install dist/*.whl
          "$tmp_dir/venv/bin/codex-imagegen" --help

  claude-plugin:
    name: Claude plugin packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate Claude plugin manifests
        run: |
          claude plugin validate --strict .
          claude plugin validate --strict plugins/codex-image
      - name: Isolated marketplace install
        run: |
          tmp_home="$(mktemp -d)"
          tmp_repo="$(mktemp -d)"
          trap 'rm -rf "$tmp_home" "$tmp_repo"' EXIT
          cp -a . "$tmp_repo/repo"
          (
            cd "$tmp_repo/repo"
            HOME="$tmp_home" claude plugin marketplace add ./.
            HOME="$tmp_home" claude plugin install codex-image@codex-imagegen-bridge --scope local
            HOME="$tmp_home" claude plugin details codex-image
          )
