name: CI

on:
  pull_request:
  push:
    branches: [main, work]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: python3 -m py_compile src/codex_imagegen_bridge/*.py scripts/doctor plugins/codex-image/scripts/codex-imagegen plugins/codex-image/scripts/doctor
      - name: Validate plugin JSON
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json >/dev/null
          python3 -m json.tool plugins/codex-image/.claude-plugin/plugin.json >/dev/null
      - name: Install test dependencies
        run: python3 -m pip install -e '.[test]'
      - name: Console entry point smoke test
        run: codex-imagegen --help
      - name: Run tests
        run: python3 -m pytest -q
